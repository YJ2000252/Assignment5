<!DOCTYPE html>
<html>
<head>
<title>GitHub Issue Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-10 rounded-xl shadow-xl w-96 text-center">

<img src="assets/github-logo.png" class="w-16 mx-auto mb-4">

<h1 class="text-2xl font-bold mb-2">
GitHub Issue Tracker
</h1>

<p class="text-gray-500 mb-6">
Track and manage repository issues
</p>

<input id="username"
class="border w-full p-2 rounded mb-3"
placeholder="Username">

<input id="password"
type="password"
class="border w-full p-2 rounded mb-4"
placeholder="Password">

<button onclick="login()"
class="bg-black text-white w-full py-2 rounded">
Sign In
</button>

<p class="text-xs text-gray-500 mt-4">
admin / admin123
</p>

</div>

<script src="js/login.js"></script>

</body>
</html>
